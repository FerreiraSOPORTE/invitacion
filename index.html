<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baby Shower - El Rey León</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --savanna-gold: #f4a261;
            --sunset-orange: #e76f51;
            --jungle-green: #4ade80;
        }

        body {
            background-color: #0b0b0b;
            color: white;
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            overflow-x: hidden;
        }

        /* Fondo general de la sabana */
        .hero-section {
            min-height: 100vh;
            background: linear-gradient(to bottom, rgba(0,0,0,0.7), rgba(0,0,0,0.9)),
                        url('https://images.unsplash.com/photo-1547471080-7cc2caa01a7e?auto=format&fit=crop&q=80&w=1920');
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            position: relative;
            padding: 2rem 0;
        }

        /* El Sol - Elemento CSS puro que nunca falla */
        .sun-container {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 1;
        }

        .sun {
            width: 350px;
            height: 350px;
            background: radial-gradient(circle, #fffb00 0%, #ff8c00 40%, transparent 70%);
            border-radius: 50%;
            filter: blur(20px);
            opacity: 0.4;
            animation: pulse 8s infinite ease-in-out;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.3; }
            50% { transform: scale(1.15); opacity: 0.5; }
        }

        .title {
            font-family: 'Cinzel', serif;
            font-size: clamp(2.5rem, 10vw, 4rem);
            color: var(--savanna-gold);
            text-shadow: 0 0 30px rgba(0,0,0,0.9);
            z-index: 10;
            letter-spacing: 2px;
        }

        /* Card con la imagen descargada como fondo */
        .card-info {
            position: relative;
            background: rgba(15, 15, 15, 0.85);
            backdrop-filter: blur(12px);
            border: 2px solid var(--savanna-gold);
            padding: 2rem 1.5rem;
            border-radius: 28px;
            margin-top: 1.5rem;
            max-width: 90%;
            width: 440px;
            z-index: 10;
            box-shadow: 0 25px 60px rgba(0,0,0,0.8);
            overflow: hidden;
        }

        /* Imagen de fondo de la card (Usando la subida por el usuario) */
        .card-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /*aca puedo seleecionar la imagen o cambiar*/
            background-image: url('imagines/animelion.png');            background-size: cover;
            background-position: center;
            opacity: 0.2; /* Opacidad baja para que el texto sea legible */
            z-index: -1;
            filter: saturate(1.2);
        }

        .btn-confirm {
            background: linear-gradient(135deg, var(--sunset-orange), #ff8c00);
            color: white;
            padding: 16px 32px;
            border-radius: 100px;
            font-weight: 800;
            display: inline-block;
            margin-top: 30px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: none;
            cursor: pointer;
            width: 100%;
            text-transform: uppercase;
            letter-spacing: 2px;
            box-shadow: 0 10px 25px rgba(231, 111, 81, 0.3);
        }

        .btn-confirm:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 15px 30px rgba(231, 111, 81, 0.5);
        }

        /* Animación de Caminata - Siluetas CSS/SVG */
        .walking-area {
            margin-top: 2.5rem;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .walking-group {
            display: flex;
            align-items: flex-end;
            gap: 20px;
            margin-bottom: 10px;
        }

        .char {
            fill: #ffffff;
            filter: drop-shadow(0 0 5px rgba(255,255,255,0.3));
            animation: bounce 0.8s infinite alternate ease-in-out;
        }

        @keyframes bounce {
            from { transform: translateY(0); }
            to { transform: translateY(-8px); }
        }

        .pumba { width: 55px; animation-delay: 0s; }
        .timon { width: 20px; animation-delay: 0.2s; }
        .simba { width: 40px; animation-delay: 0.4s; }

    </style>
</head>
<body>

    <!-- Sol de fondo -->
    <div class="sun-container">
        <div class="sun"></div>
    </div>

    <div class="hero-section">
        <p class="text-xs md:text-sm tracking-[0.4em] uppercase mb-2 z-10 font-semibold text-orange-200">¡Un nuevo ciclo comienza!</p>
        <h1 class="title">BABY SHOWER</h1>
        
        <div class="card-info">
            <!-- Imagen de fondo real cargada por el usuario -->
            <div class="card-bg"></div>

            <!-- Contenido principal -->
            <div class="relative z-20">
                <div class="w-32 h-32 mx-auto mb-6 relative group">
                    <div class="absolute inset-0 bg-yellow-400 opacity-20 rounded-full blur-2xl group-hover:opacity-40 transition-opacity"></div>
                    <!-- Icono de Corona Real (Reemplaza a la estrella) -->
                    <div class="w-full h-full flex items-center justify-center">
                        <svg viewBox="0 0 24 24" class="w-24 h-24 fill-yellow-500 opacity-90 drop-shadow-lg" xmlns="http://www.w3.org/2000/svg">
                            <path d="M5 16L3 5L8.5 10L12 4L15.5 10L21 5L19 16H5M19 19C19 19.6 18.6 20 18 20H6C5.4 20 5 19.6 5 19V18H19V19Z"/>
                        </svg>
                    </div>
                </div>

                <h2 class="text-2xl font-bold mb-6 text-orange-200 uppercase tracking-widest">Bienvenida al Pequeño Rey</h2>
                
                <div class="space-y-6 text-lg font-medium">
                    <div class="flex items-center justify-center gap-4 bg-white/5 p-3 rounded-xl border border-white/10">
                        <span class="text-2xl">📅</span>
                        <p>Domingo, 05 de Abril</p>
                    </div>
                    <div class="flex items-center justify-center gap-4 bg-white/5 p-3 rounded-xl border border-white/10">
                        <span class="text-2xl">🕒</span>
                        <p>4:00 PM</p>
                    </div>
                <!--<div class="flex items-center justify-center gap-4 bg-white/5 p-3 rounded-xl border border-white/10">
                        <span class="text-2xl">📍</span>
                        <p>Calle 2 # 4-16 - Br Doña Ceci</p>
                    </div>-->
                        <!-- Ubicación clickeable con link a Google Maps -->
                        <a href="https://www.google.com/maps/search/?api=1&query=7.898531,-72.526429" target="_blank" class="flex items-center justify-center gap-4 bg-white/5 p-3 rounded-xl border border-white/10 hover:bg-white/10 transition-colors duration-300 cursor-pointer group text-white no-underline">
                            <span class="text-2xl group-hover:scale-110 transition-transform">📍</span>
                            <div class="text-left">
                                <p>Av. 4 #2-69 - Br Doña Ceci</p>
                                <p class="text-xs text-orange-300 mt-0.5 font-bold uppercase tracking-wider flex items-center gap-1">
                                    Ver en el mapa 🗺️
                                </p>
                            </div>
                        </a>
                
                </div>

                <button class="btn-confirm" onclick="confirmarAsistencia()">
                    CONFIRMAR ASISTENCIA
                </button>
            </div>
        </div>

        <!-- Animación Hakuna Matata Segura -->
        <div class="walking-area">
            <div class="walking-group">
                <!-- Pumba Silueta -->
                <svg class="char pumba" viewBox="0 0 100 80">
                    <path d="M10,40 Q30,10 60,30 Q90,10 90,40 Q90,70 60,70 Q30,70 10,40 Z" />
                    <rect x="25" y="65" width="8" height="12" />
                    <rect x="55" y="65" width="8" height="12" />
                </svg>
                <!-- Timón Silueta -->
                <svg class="char timon" viewBox="0 0 40 100">
                    <ellipse cx="20" cy="20" rx="10" ry="15" />
                    <rect x="15" y="35" width="10" height="40" rx="5" />
                    <rect x="12" y="75" width="6" height="15" />
                    <rect x="22" y="75" width="6" height="15" />
                </svg>
                <!-- Simba Silueta -->
                <svg class="char simba" viewBox="0 0 100 80">
                    <path d="M20,30 Q45,10 75,30 Q85,45 75,65 Q45,75 20,60 Z" />
                    <rect x="35" y="60" width="8" height="15" />
                    <rect x="65" y="60" width="8" height="15" />
                </svg>
            </div>
            <p class="text-[10px] tracking-[0.6em] uppercase opacity-50 font-bold">Hakuna Matata</p>
        </div>
    </div>

    <div class="py-16 px-8 text-center bg-[#050505] border-t border-white/5">
        <p class="italic text-zinc-400 max-w-sm mx-auto text-sm leading-relaxed">
            "Todo lo que ves coexiste en un delicado equilibrio..."
        </p>
        <p class="mt-4 font-bold text-yellow-600 tracking-[0.3em] text-[10px] uppercase">— Mufasa</p>
    </div>

    <script>
        const telefonoWhatsApp = "3505894638"; 

        function confirmarAsistencia() {
            const msj = `🦁👑 ¡Hola! Confirmo mi asistencia al Baby Shower del Pequeño Rey 👶✨\n¡Hakuna Matata!`;
            window.open(`https://wa.me/${telefonoWhatsApp}?text=${encodeURIComponent(msj)}`, '_blank');
        }

        // Efecto visual dinámico para el sol
        document.addEventListener('mousemove', (e) => {
            const sun = document.querySelector('.sun-container');
            const x = (window.innerWidth / 2 - e.pageX) / 100;
            const y = (window.innerHeight / 2 - e.pageY) / 100;
            if(sun) sun.style.transform = `translate(calc(-50% + ${x}px), calc(-50% + ${y}px))`;
        });
    </script>
</body>
</html>
